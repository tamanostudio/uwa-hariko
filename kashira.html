<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カシラ製作 — 宇和はりこ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red:#E8001C; --ink:#1a1814; --white:#ffffff; --off:#f7f6f4; --gray:#ebebeb; --muted:#777; --text:#2a2824; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; background: var(--white); color: var(--text); line-height: 1.85; letter-spacing: 0.04em; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    nav::before { content: ''; position: absolute; inset: 0; background: rgba(26,24,20,0.97); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }
    .nav-brand { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
    .nav-brand-name { font-family: 'Noto Sans JP'; font-weight: 500; font-size: 1rem; letter-spacing: 0.14em; color: var(--white); }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; flex-shrink: 0; }
    .logo-mark img { width: 36px; height: 36px; object-fit: contain; }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a { font-size: 0.78rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--red); }

    .coming-soon {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .coming-soon::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border: 1px solid rgba(232,0,28,0.1);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .coming-soon::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border: 1px solid rgba(232,0,28,0.07);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .coming-soon-inner { text-align: center; position: relative; z-index: 1; }
    .cs-eyebrow { font-size: 0.65rem; letter-spacing: 0.36em; color: var(--red); text-transform: uppercase; margin-bottom: 2rem; }
    .cs-title { font-family: 'Noto Serif JP', serif; font-weight: 400; font-size: clamp(2.2rem, 5vw, 4rem); letter-spacing: 0.12em; line-height: 1.4; color: var(--white); margin-bottom: 1rem; }
    .cs-sub { font-size: 0.8rem; letter-spacing: 0.18em; color: rgba(255,255,255,0.4); margin-bottom: 3rem; }
    .cs-text { font-size: 0.88rem; line-height: 2.4; color: rgba(255,255,255,0.55); max-width: 480px; margin: 0 auto 3rem; }
    .cs-divider { width: 40px; height: 1px; background: var(--red); margin: 0 auto 2.4rem; }
    .cs-contact { font-size: 0.75rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.35); margin-bottom: 0.6rem; }
    .cs-email { font-size: 0.88rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.2s; }
    .cs-email:hover { color: var(--red); }
    .cs-back { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 3rem; font-size: 0.75rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s; }
    .cs-back::before { content: '←'; color: var(--red); }
    .cs-back:hover { color: rgba(255,255,255,0.6); }

    
    /* ── HAMBURGER ── */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; z-index: 201; position: relative; }
    .nav-toggle span { display: block; width: 22px; height: 1.5px; background: var(--white); margin: 5px 0; transition: transform 0.3s, opacity 0.3s; }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.4rem; }
      .nav-toggle { display: block; }
      .nav-links { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,24,20,0.97); flex-direction: column; justify-content: center; align-items: center; gap: 2.4rem; z-index: 200; }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 1.05rem; letter-spacing: 0.12em; color: var(--white); }
    }

    .back-to-home { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; letter-spacing: 0.12em; color: var(--red); text-decoration: none; margin-bottom: 1.4rem; }
    .back-to-home::before { content: '←'; }
    .back-to-home:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="uwa-hariko.html">
      <span class="logo-mark"><img src="rogo3.png" alt="宇和はりこ"></span>
      <span class="nav-brand-name">宇和はりこ</span>
    </a>
    <ul class="nav-links">
      <li><a href="uwa-hariko.html">ホーム</a></li>
<li><a href="uwa-hariko.html#about">工房について</a></li>
      <li><a href="works.html">作品</a></li>
      <li><a href="uwa-hariko.html#news">お知らせ</a></li>      <li><a href="kashira.html" style="color:var(--red);">カシラ製作</a></li>
      <li><a href="uwa-hariko.html#contact">お問い合わせ</a></li>
      <li><a href="https://www.instagram.com/uwa_hariko/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
      </a></li>
    </ul>
      <button class="nav-toggle" aria-label="メニュー" id="navToggle"><span></span><span></span><span></span></button>
  </nav>

  <div class="coming-soon">
    <div class="coming-soon-inner">
      <p class="cs-eyebrow">Coming Soon</p>
      <h1 class="cs-title">カシラ製作</h1>
      <p class="cs-sub">Ushioni &amp; Shika no Kashira</p>
      <div class="cs-divider"></div>
      <p class="cs-text">牛鬼・鹿のカシラの製造事業について、ページを準備中です。<br>ご依頼・ご相談はメールにてお気軽にご連絡ください。</p>
      <p class="cs-contact">お問い合わせ</p>
      <a class="cs-email" href="mailto:uwahariko@gmail.com">uwahariko@gmail.com</a>
      <br>
      <a class="cs-back" href="uwa-hariko.html">トップページに戻る</a>
    </div>
  </div>

  <script>
    (function(){
      var toggle = document.getElementById('navToggle');
      var links  = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function(){
        toggle.classList.toggle('open');
        links.classList.toggle('open');
      });
      links.querySelectorAll('a').forEach(function(a){
        a.addEventListener('click', function(){
          toggle.classList.remove('open');
          links.classList.remove('open');
        });
      });
    })();
  </script>
</body>
</html>
