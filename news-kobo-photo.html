  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    nav::before { content: ''; position: absolute; inset: 0; background: rgba(26,24,20,0.97); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }

    .nav-links { display: flex; gap: 2.2rem; list-style: none; }

    .page-header { padding: 10rem 3rem 4rem; background: var(--off); }
    .page-header-inner { max-width: 740px; margin: 0 auto; }
    .back-link { display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; letter-spacing: 0.12em; color: var(--muted); text-decoration: none; margin-bottom: 2.4rem; transition: color 0.2s; }
    .back-link::before { content: '←'; color: var(--red); }
    .back-link:hover { color: var(--red); }
    .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.4rem; }
    .post-date { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
    .post-cat { font-size: 0.65rem; letter-spacing: 0.12em; color: var(--white); background: var(--red); padding: 0.2em 0.8em; }
    .post-title { font-family: 'Noto Serif JP', serif; font-weight: 400; font-size: clamp(1.6rem, 3vw, 2.4rem); letter-spacing: 0.08em; line-height: 1.5; }
    .post-body { padding: 5rem 3rem 7rem; }
    .post-body-inner { max-width: 740px; margin: 0 auto; }
    .post-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 3rem; }
    .post-gallery img { width: 100%; display: block; height: auto; }
    .post-gallery img:last-child:nth-child(odd) { grid-column: 1 / -1; }
    .post-text { font-size: 0.95rem; line-height: 2.4; color: var(--text); }
    .post-text p { margin-bottom: 1.8em; }
    .post-nav { margin-top: 5rem; padding-top: 2.4rem; border-top: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
    .post-nav a { font-size: 0.78rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .post-nav a:hover { color: var(--red); }
    .post-nav .prev::before { content: '← '; color: var(--red); }
    .post-nav .next::after { content: ' →'; color: var(--red); }
    footer { background: var(--ink); padding: 2.4rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-brand { display: flex; align-items: center; gap: 0.7rem; }
    .footer-name { font-family: 'Noto Sans JP'; font-weight: 400; font-size: 0.95rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); }
    footer p { font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; z-index: 201; position: relative; }
    .nav-toggle span { display: block; width: 22px; height: 1.5px; background: var(--white); margin: 5px 0; transition: transform 0.3s, opacity 0.3s; }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.4rem; }
      .nav-toggle { display: block; }
      .nav-links { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,24,20,0.97); flex-direction: column; justify-content: center; align-items: center; gap: 2.4rem; z-index: 200; }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 1.05rem; letter-spacing: 0.12em; color: var(--white); }
      .page-header { padding: 7rem 1.5rem 3rem; }
      .post-body { padding: 3rem 1.5rem 5rem; }
      .post-gallery { grid-template-columns: 1fr; }
      .post-gallery img:last-child:nth-child(odd) { grid-column: auto; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>

  <script>
    (function(){
      var toggle = document.getElementById('navToggle');
      var links = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function(){ toggle.classList.toggle('open'); links.classList.toggle('open'); });
