<title>宇和はりこ 在庫管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem; }
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 12px; }
.title { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.subtitle { font-size: 13px; color: #888; margin-top: 3px; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #d0cec8; font-size: 13px; cursor: pointer; background: #fff; color: #1a1a1a; transition: all 0.15s; font-family: inherit; }
.btn:hover { background: #f0ede8; }
.btn.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.btn.primary:hover { background: #333; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.tab-wrap { display: flex; align-items: center; gap: 2px; }
.tab { padding: 7px 16px; border-radius: 999px; border: 1px solid #d0cec8; font-size: 13px; cursor: pointer; background: #fff; color: #666; transition: all 0.15s; font-family: inherit; }
.tab.active { background: #1a1a1a; color: #fff; border-color: transparent; font-weight: 500; }
.tab:hover:not(.active) { background: #f0ede8; }
.edit-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #d0cec8; background: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; transition: all 0.15s; padding: 0; }
.edit-btn:hover { background: #f0ede8; color: #1a1a1a; }
.divider { border: none; border-top: 1px solid #e5e3de; margin: 0.75rem 0 1.25rem; }
.summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e5e3de; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.section-label { font-size: 13px; color: #888; margin-bottom: 12px; }
.group-label { font-size: 12px; font-weight: 600; color: #999; margin: 1.25rem 0 8px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 4px; }
.product-card { background: #fff; border: 1px solid #e5e3de; border-radius: 12px; padding: 1rem 1.25rem; }
.product-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
.product-meta { font-size: 12px; color: #bbb; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
.badge.danger { background: #fde8e8; color: #a32d2d; border-color: #f09595; }
.stock-row { display: flex; align-items: center; justify-content: space-between; }
.stock-count { font-size: 26px; font-weight: 700; color: #1a1a1a; }
.stock-count.low { color: #c0392b; }
.stock-unit { font-size: 12px; color: #aaa; margin-left: 3px; }
.stepper { display: flex; align-items: center; gap: 4px; }
.step-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #d0cec8; background: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1a1a1a; transition: all 0.12s; font-family: inherit; font-weight: 600; }
.step-btn:hover { background: #f0ede8; border-color: #aaa; }
.step-btn:active { transform: scale(0.90); }
.empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 360px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a1a; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
.field input { width: 100%; padding: 9px 11px; border: 1px solid #d0cec8; border-radius: 8px; font-size: 14px; background: #fafaf8; color: #1a1a1a; font-family: inherit; outline: none; transition: border 0.15s; }
.field input:focus { border-color: #888; background: #fff; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
</style>

  <div id="chat-section" style="margin-top:2rem;">
    <div style="font-size:13px;color:#888;margin-bottom:12px;" id="chat-label">メッセージ</div>
    <div id="chat-messages" style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem;min-height:120px;max-height:320px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:10px;"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="chat-input" placeholder="メッセージを入力..." style="flex:1;padding:9px 11px;border:1px solid #d0cec8;border-radius:8px;font-size:14px;background:#fafaf8;color:#1a1a1a;font-family:inherit;outline:none;" />
      <button class="btn primary" onclick="sendMessage()">送信</button>
    </div>
  </div>
</div>

<!-- 店舗名変更モーダル -->
<div class="modal-overlay" id="rename-modal" style="display:none" onclick="if(event.target===this)closeModal('rename')">
  <div class="modal">
    <div class="modal-title">店舗名を変更</div>
    <input type="hidden" id="rename-store-id" />
    <div class="field">
      <label>新しい店舗名</label>
      <input type="text" id="rename-store-name" placeholder="店舗名を入力" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('rename')">キャンセル</button>
      <button class="btn primary" onclick="doRenameStore()">変更する</button>
    </div>
  </div>
</div>

<!-- 店舗追加モーダル -->
<div class="modal-overlay" id="store-modal" style="display:none" onclick="if(event.target===this)closeModal('store')">
  <div class="modal">
    <div class="modal-title">店舗を追加</div>
    <div class="field">
      <label>店舗名</label>
      <input type="text" id="new-store-name" placeholder="例：梅田店" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('store')">キャンセル</button>
      <button class="btn primary" onclick="addStore()">追加</button>
    </div>
  </div>
</div>

<!-- 商品追加モーダル -->
<div class="modal-overlay" id="product-modal" style="display:none" onclick="if(event.target===this)closeModal('product')">
  <div class="modal">
    <div class="modal-title">商品を追加</div>
    <div class="field">
      <label>商品名</label>
      <input type="text" id="new-product-name" placeholder="例：張子うさぎ" />
    </div>
    <div class="field">
      <label>グループ名（任意）</label>
      <input type="text" id="new-product-group" placeholder="例：⑨うさぎ" />
    </div>
    <div class="field">
      <label>初期在庫数</label>
      <input type="number" id="new-product-stock" value="0" min="0" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('product')">キャンセル</button>
      <button class="btn primary" onclick="addProduct()">追加</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzn0XTbA1ao3lVAZDPItkspmeI2LBsqgZ-4x_jEi9D5HKF2uSe_ilTs4S42NWtgal5v/exec';

const STORES = [
  { id: '本店' },
  { id: '池田屋' },
  { id: '宇和民具館' },
  { id: 'MUGIカフェ' },
  { id: 'sui' },
  { id: 'シロシタ' },
  { id: 'きさいや広場' },
];

const PRODUCTS = [
  { id: '五つ鹿',       group: '①五つ鹿' },
  { id: '五つ鹿（小）', group: '①五つ鹿' },
  { id: '招き猫（赤）',       group: '②招き猫' },
  { id: '招き猫（白）',       group: '②招き猫' },
  { id: '招き猫（黒）',       group: '②招き猫' },
  { id: '招き猫（小）赤',     group: '②招き猫' },
  { id: '招き猫（小）白',     group: '②招き猫' },
  { id: '招き猫（小）黒',     group: '②招き猫' },
  { id: 'だるま（大）', group: '③だるま' },
  { id: 'だるま（中）', group: '③だるま' },
  { id: 'だるま（小）', group: '③だるま' },
  { id: 'ふくろう',     group: '④ふくろう' },
  { id: 'マンモス',     group: '⑤マンモス' },
  { id: '午（うま）',   group: '⑥午' },
  { id: '未（ひつじ）白', group: '⑦未' },
  { id: '未（ひつじ）黒', group: '⑦未' },
  { id: '牛鬼',         group: '⑧牛鬼' },
];

// inventory[店舗名][商品名] = 個数
let inventory = {};
let currentStore = STORES[0].id;
let loading = false;

// スプレッドシートからデータ読み込み
async function loadFromSheet() {
  setLoading(true);
  try {
    const res = await fetch(GAS_URL + '?action=get');
    const json = await res.json();
    inventory = {};
    STORES.forEach(s => {
      inventory[s.id] = {};
      PRODUCTS.forEach(p => { inventory[s.id][p.id] = 0; });
    });
    // data[0]はヘッダー行、それ以降がデータ
    json.data.forEach((row, i) => {
      if (i === 0) return;
      const [store, product, count] = row;
      if (inventory[store] !== undefined) {
        inventory[store][product] = Number(count) || 0;
      }
    });
  } catch(e) {
    alert('データの読み込みに失敗しました。ネットワークを確認してください。');
  }
  setLoading(false);
  render();
  loadMessages();
}

// スプレッドシートに保存
async function saveToSheet(store, product, count) {
  try {
    const url = `${GAS_URL}?action=set&store=${encodeURIComponent(store)}&product=${encodeURIComponent(product)}&count=${count}`;
    await fetch(url, { mode: 'no-cors' });
  } catch(e) {
    console.error('保存エラー:', e);
  }
}

function setLoading(bool) {
  loading = bool;
  document.getElementById('loading-bar').style.display = bool ? 'block' : 'none';
}

function render() {
  renderTabs();
  renderSummary();
  renderProducts();
  const store = currentStore;
  document.getElementById('store-subtitle').textContent = store ? store + ' の在庫' : '店舗を選択してください';
  document.getElementById('section-label').textContent = store ? store + ' の在庫一覧' : '在庫一覧';
  document.getElementById('chat-label').textContent = store ? store + ' へのメッセージ' : 'メッセージ';
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = STORES.map(s =>
    `<button class="tab ${s.id === currentStore ? 'active' : ''}" onclick="selectStore('${s.id}')">${s.id}</button>`
  ).join('');
}

function renderSummary() {
  const bar = document.getElementById('summary-bar');
  if (!currentStore) { bar.innerHTML = ''; return; }
  const inv = inventory[currentStore] || {};
  const total = Object.values(inv).reduce((a, b) => a + b, 0);
  bar.innerHTML = `
    <div class="metric"><div class="metric-label">総在庫数</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">商品種類</div><div class="metric-value">${PRODUCTS.length}</div></div>
  `;
}

function renderProducts() {
  const area = document.getElementById('product-area');
  if (!currentStore) { area.innerHTML = '<div class="empty">店舗タブを選択してください</div>'; return; }
  const inv = inventory[currentStore] || {};
  const groups = {};
  PRODUCTS.forEach(p => {
    const g = p.group || 'その他';
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  });
  area.innerHTML = Object.entries(groups).map(([groupName, products]) => `
    <div class="group-label">${groupName}</div>
    <div class="product-grid">
      ${products.map(p => {
        const count = inv[p.id] || 0;
        const isLow = count > 0 && count <= 3;
        const isZero = count === 0;
        return `<div class="product-card">
          <div class="product-name">${p.id}</div>
          <div class="product-meta">
            ${isZero ? '<span class="badge danger">在庫なし</span>' : isLow ? '<span class="badge">在庫少</span>' : '<span style="color:#ddd">—</span>'}
          </div>
          <div class="stock-row">
            <div>
              <span class="stock-count ${isLow||isZero ? 'low' : ''}">${count}</span>
              <span class="stock-unit">個</span>
            </div>
            <div class="stepper">
              <button class="step-btn" onclick="changeStock('${p.id}',-5)">-5</button>
              <button class="step-btn" onclick="changeStock('${p.id}',-1)">−</button>
              <button class="step-btn" onclick="changeStock('${p.id}',1)">＋</button>
              <button class="step-btn" onclick="changeStock('${p.id}',5)">+5</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function selectStore(id) { currentStore = id; render(); loadMessages(); }

let saving = false;
async function changeStock(productId, delta) {
  if (!currentStore || saving) return;
  saving = true;
  if (!inventory[currentStore]) inventory[currentStore] = {};
  const cur = inventory[currentStore][productId] || 0;
  const newCount = Math.max(0, cur + delta);
  inventory[currentStore][productId] = newCount;
  render();
  await saveToSheet(currentStore, productId, newCount);
  saving = false;
}

function openModal(type) {
  document.getElementById(type + '-modal').style.display = 'flex';
}
function closeModal(type) { document.getElementById(type + '-modal').style.display = 'none'; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('store'); closeModal('product'); }
});

// チャットメッセージ読み込み
async function loadMessages() {
  try {
    const url = `${GAS_URL}?action=getMessages&store=${encodeURIComponent(currentStore)}`;
    const res = await fetch(url);
    const json = await res.json();
    renderMessages(json.messages || []);
  } catch(e) { console.error('メッセージ読み込みエラー:', e); }
}

function renderMessages(messages) {
  const box = document.getElementById('chat-messages');
  if (messages.length === 0) {
    box.innerHTML = '<div style="color:#bbb;font-size:13px;text-align:center;margin:auto;">まだメッセージはありません</div>';
    return;
  }
  box.innerHTML = messages.map(m => `
    <div style="background:#f5f4f0;border-radius:8px;padding:8px 12px;">
      <div style="font-size:11px;color:#aaa;margin-bottom:3px;">${m.date} ${m.name}</div>
      <div style="font-size:14px;color:#1a1a1a;">${m.text}</div>
    </div>
  `).join('');
  box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentStore) return;
  input.value = '';
  const now = new Date();
  const date = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  try {
    const url = `${GAS_URL}?action=sendMessage&store=${encodeURIComponent(currentStore)}&text=${encodeURIComponent(text)}&date=${encodeURIComponent(date)}`;
    await fetch(url, { mode: 'no-cors' });
    setTimeout(() => loadMessages(), 800);
  } catch(e) { console.error('送信エラー:', e); }
}

// 起動時にスプレッドシートから読み込み
loadFromSheet();
</script>
</body>
</html>
