  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red:#E8001C; --ink:#1a1814; --white:#ffffff; --off:#f7f6f4; --gray:#ebebeb; --muted:#777; --text:#2a2824; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; background: var(--white); color: var(--text); line-height: 1.85; letter-spacing: 0.04em; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 3rem; border-bottom: 1px solid rgba(0,0,0,0.07); }
    nav::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.92); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }
    .nav-brand { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
    .nav-brand-name { font-family: 'Noto Sans JP'; font-weight: 500; font-size: 1rem; letter-spacing: 0.14em; color: var(--ink); }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--red); border-radius: 50%; flex-shrink: 0; overflow: hidden; }
    .logo-mark img { width: 22px; height: 22px; object-fit: contain; filter: brightness(0) invert(1); }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a { font-size: 0.78rem; letter-spacing: 0.1em; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--red); }

    .page-header { padding: 10rem 3rem 5rem; background: var(--off); }
    .page-header-inner { max-width: 800px; margin: 0 auto; }
    .page-eyebrow { font-size: 0.68rem; letter-spacing: 0.28em; color: var(--red); text-transform: uppercase; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.7rem; }
    .page-eyebrow::before { content: ''; display: block; width: 28px; height: 1px; background: var(--red); }
    .page-title { font-family: 'Noto Serif JP', serif; font-weight: 400; font-size: clamp(2rem, 4vw, 3.2rem); letter-spacing: 0.1em; line-height: 1.4; }
    .page-title-en { font-size: 0.78rem; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; margin-top: 0.5rem; }

    .content-section { padding: 6rem 3rem 8rem; }
    .content-inner { max-width: 800px; margin: 0 auto; }

    .news-list { border-top: 1px solid rgba(0,0,0,0.08); }

    .news-item {
      display: flex;
      align-items: baseline;
      gap: 1.4rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      text-decoration: none;
      color: var(--text);
      transition: color 0.2s;
    }
    .news-item:hover { color: var(--red); }

    .news-date { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; flex-shrink: 0; }
    .news-cat { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--white); background: var(--red); padding: 0.2em 0.7em; white-space: nowrap; flex-shrink: 0; }
    .news-title { font-size: 0.92rem; letter-spacing: 0.05em; line-height: 1.6; }

    footer { background: var(--ink); padding: 2.4rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-brand { display: flex; align-items: center; gap: 0.7rem; }
    .footer-name { font-family: 'Noto Sans JP'; font-weight: 400; font-size: 0.95rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); }
    footer p { font-size: 0.7rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.4rem; }
      .nav-links { display: none; }
      .page-header { padding: 7rem 1.5rem 3rem; }
      .content-section { padding: 4rem 1.5rem 6rem; }
      .news-item { flex-wrap: wrap; gap: 0.6rem; }
      .news-title { width: 100%; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
